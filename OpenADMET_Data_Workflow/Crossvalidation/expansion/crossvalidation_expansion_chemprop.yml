model-crossvalidation:
  input: ../../Deduplication/Training/expansion/deduplicated/openadmet_expansion_only_training_deduplicated_hlm_log1p.csv
  output_dir: chemprop_expansion_hlm_crossvalidation_log1p

  smiles_column: SMILES_standardized
  target_column: hlm_value_scaled_log1p_deduplicated
  row_id_column: mol_id

  dropna_smiles: true
  dropna_target: true

  models:
    - chemprop

  feature_sets:
    - chemeleon
    - morgan
    - chemeleon + morgan


  morgan_radius:
    - 2
    - 3

  morgan_bits:
    - 512
    - 1024
    - 2048

  avalon_bits:
    - 1024

  rdkit_path_min:
    - 3

  rdkit_path_max:
    - 6
    - 7
    - 8

  rdkit_path_bits:
    - 1024

  features:
    mordred_max_nan_frac: 0.2
    mordred_drop_constant: true

  metrics:
    - rmse
    - mae
    - r2
    - spearman_rho

  primary_metric: r2

  split:
    method: scaffold
    outer_folds: 5
    inner_folds: 5
    shuffle: true
    random_state: 42
    scaffold_include_chirality: false

  optimization:
    enabled: true
    metric: mae
    n_trials: 5
    random_state: 42

  refit_best_model: true
  refit_validation_fraction: 0.1
  save_fold_predictions: true
  save_best_params: true
  random_state: 42
  n_jobs: -1

  model_params:
    rf: {}

    svm: {}

    autogluon:
      presets: best_quality
      time_limit_s: 60

    chemprop:
      max_epochs: 20
      early_stopping: true
      early_stopping_patience: 10
      batch_size: 64
      enable_progress_bar: false
      accelerator: auto
      devices: 1