name: CI-CD

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Cache conda packages (speeds up env solves/installs)
      - name: Cache conda pkgs
      - uses: actions/cache@v4
        with:
          path: |
            ~/.conda/pkgs
            ~/.mamba/pkgs
          key: conda-pkgs-${{ runner.os }}-${{ hashFiles('environment.yml') }}
          restore-keys: |
            conda-pkgs-${{ runner.os }}-

      # Cache pip downloads
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('environment.yml', 'pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # Cache CheMeleon checkpoint download (~/.chemprop/chemeleon_mp.pt)
      - name: Cache CheMeleon checkpoint
        uses: actions/cache@v4
        with:
          path: ~/.chemprop
          key: chemeleon-ckpt-${{ runner.os }}-v1
          restore-keys: |
            chemeleon-ckpt-${{ runner.os }}-

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Mambaforge
          python-version: "3.11"
          environment-file: environment.yml
          activate-environment: deepmirror_ml_task
          auto-activate-base: false
          use-mamba: true

      - name: Install project
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        shell: bash -l {0}
        run: |
          pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Mambaforge
          python-version: "3.11"
          environment-file: environment.yml
          activate-environment: deepmirror_ml_task
          auto-activate-base: false
          use-mamba: true

      - name: Build sdist/wheel
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      # Optional: attach dist/* to a GitHub Release for the tag
      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*